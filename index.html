<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GetYourVideo - Descarga vídeos gratis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: white; min-height: 100vh; }
    header { background: #1a1a2e; padding: 16px 20px; text-align: center; border-bottom: 2px solid #e94560; }
    header h1 { color: #e94560; font-size: 1.8rem; letter-spacing: 1px; }
    header p { color: #aaa; margin-top: 4px; font-size: 0.9rem; }
    .hero { text-align: center; padding: 40px 16px 30px; }
    .hero h2 { font-size: 1.8rem; margin-bottom: 12px; line-height: 1.3; }
    .hero p { color: #aaa; font-size: 0.95rem; margin-bottom: 30px; }
    .search-box { display: flex; flex-direction: column; max-width: 680px; margin: 0 auto; gap: 10px; }
    .search-box input { width: 100%; padding: 16px 20px; border-radius: 50px; border: 2px solid #333; background: #1a1a2e; color: white; font-size: 1rem; outline: none; }
    .search-box input:focus { border-color: #e94560; }
    .search-box button { width: 100%; padding: 16px; background: #e94560; color: white; border: none; border-radius: 50px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .search-box button:hover { background: #c73652; }
    @media (min-width: 600px) {
      .search-box { flex-direction: row; }
      .search-box input { flex: 1; width: auto; }
      .search-box button { width: auto; padding: 16px 32px; }
      .hero h2 { font-size: 2.2rem; }
    }
    .platforms { display: flex; justify-content: center; gap: 20px; margin-top: 16px; color: #aaa; font-size: 0.85rem; flex-wrap: wrap; }
    #result { max-width: 680px; margin: 24px auto; padding: 0 16px 60px; }
    .video-card { background: #1a1a2e; border-radius: 16px; padding: 20px; border: 1px solid #2a2a3e; }
    .video-player { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 14px; }
    .video-player video { width: 100%; display: block; max-height: 350px; }
    .video-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
    .video-duration { color: #aaa; font-size: 0.8rem; margin-bottom: 16px; }
    .formats-title { color: #aaa; font-size: 0.8rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .formats { display: flex; flex-direction: column; gap: 8px; }
    .format-btn { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #0f0f1a; border: 1px solid #2a2a3e; border-radius: 10px; color: white; transition: 0.2s; cursor: pointer; width: 100%; }
    .format-btn:hover { border-color: #e94560; background: #1a0a10; }
    .format-btn .quality { font-weight: bold; color: #e94560; font-size: 0.95rem; }
    .format-btn .info { color: #888; font-size: 0.8rem; }
    .format-btn .dl-btn { background: #e94560; padding: 7px 14px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; white-space: nowrap; }
    .loading { text-align: center; padding: 50px 20px; color: #aaa; }
    .spinner { width: 48px; height: 48px; border: 4px solid #333; border-top: 4px solid #e94560; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 1rem; color: white; margin-bottom: 6px; }
    .loading-sub { font-size: 0.82rem; color: #666; }
    .dl-loading { background: #1a1a2e; border-radius: 12px; padding: 24px 20px; text-align: center; margin-bottom: 16px; border: 1px solid #e94560; }
    .dl-loading p { color: white; font-size: 0.95rem; margin-bottom: 6px; }
    .dl-loading small { color: #666; font-size: 0.82rem; }
    .dl-success { background: #1a2e1a; border-radius: 12px; padding: 24px 20px; text-align: center; margin-bottom: 16px; border: 1px solid #4caf50; }
    .dl-success .check { font-size: 2.5rem; margin-bottom: 10px; }
    .dl-success p { color: white; font-size: 1rem; font-weight: 600; }
    .error { background: #2d1a1a; border: 1px solid #e94560; border-radius: 10px; padding: 20px; color: #ff6b6b; text-align: center; }
    footer { text-align: center; padding: 30px 20px; color: #444; border-top: 1px solid #1a1a2e; font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <h1>🎬 GetYourVideo</h1>
  <p>Descarga vídeos de TikTok, YouTube e Instagram gratis</p>
</header>

<div class="hero">
  <h2>Descarga cualquier vídeo</h2>
  <p>Pega el link y descarga en alta calidad, sin marca de agua</p>
  <div class="search-box">
    <input type="text" id="urlInput" placeholder="Pega aquí el link del vídeo..." />
    <button onclick="getVideo()">⬇ Obtener vídeo</button>
  </div>
  <div class="platforms">
    <span>✅ TikTok</span>
    <span>✅ YouTube</span>
    <span>✅ Instagram</span>
  </div>
</div>

<div id="result"></div>

<footer>
  <p>GetYourVideo © 2025 — Descarga vídeos gratis y sin marca de agua</p>
</footer>

<script>
  let currentUrl = '';

  async function getVideo() {
    const url = document.getElementById('urlInput').value.trim();
    const result = document.getElementById('result');
    if (!url) return alert('Por favor pega un link');
    currentUrl = url;

    result.innerHTML = `<div class="loading">
      <div class="spinner"></div>
      <p class="loading-text">Obteniendo información del vídeo...</p>
      <p class="loading-sub">Esto puede tardar unos segundos</p>
    </div>`;

    try {
      const res = await fetch('/api/info', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      const formatsHTML = data.formats.map(f => `
        <button class="format-btn" onclick="startDownload('${f.quality}')">
          <span class="quality">${f.quality}</span>
          <span class="info">${f.label}</span>
          <span class="dl-btn">⬇ Descargar</span>
        </button>`).join('');

      result.innerHTML = `
        <div class="video-card">
          <div class="video-player">
            <video controls preload="metadata" poster="${data.thumbnail}">
              <source src="${data.thumbnail}" type="video/mp4">
            </video>
          </div>
          <div class="video-title">${data.title}</div>
          <div class="video-duration">⏱ ${data.duration || 'N/A'}</div>
          <div class="formats-title">Elige la calidad</div>
          <div class="formats">${formatsHTML}</div>
        </div>`;
    } catch (e) {
      result.innerHTML = `<div class="error">❌ ${e.message}</div>`;
    }
  }

  function startDownload(quality) {
    const existing = document.getElementById('dl-loading');
    if (existing) existing.remove();

    document.getElementById('result').insertAdjacentHTML('afterbegin', `
      <div id="dl-loading" class="dl-loading">
        <div class="spinner"></div>
        <p>Preparando tu descarga en ${quality}...</p>
        <small>En unos segundos aparecerá en tu carpeta de descargas.</small>
      </div>`);

    window.location.href = `/api/download?url=${encodeURIComponent(currentUrl)}&quality=${quality}`;

    setTimeout(() => {
      const dl = document.getElementById('dl-loading');
      if (dl) {
        dl.className = 'dl-success';
        dl.innerHTML = `
          <div class="check">✅</div>
          <p>¡Listo! Tienes tu vídeo en el apartado de descargas.</p>`;
      }
    }, 5000);
  }

  document.getElementById('urlInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') getVideo();
  });
</script>

</body>
</html>
